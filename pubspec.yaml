name: tyto_app
description: "Tyto — l'IA du monde animal"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1       # charge Fraunces, Newsreader, Karla automatiquement
  http: ^1.2.1               # appels vers l'API de tytoai.app (le site déjà en place)
  supabase_flutter: ^2.6.0   # connexion (lien magique / Google), même compte que le site
  shared_preferences: ^2.2.3 # mémorise la session utilisateur sur l'appareil
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
