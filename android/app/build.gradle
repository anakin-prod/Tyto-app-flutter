plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.0.0"

android {
    namespace "app.tytoai.twa"
    compileSdk 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        // ⚠️ Même identifiant que l'app actuelle (Play Console), pour pouvoir
        // un jour remplacer la version PWA par celle-ci comme une simple mise
        // à jour, sans perdre les avis / installations déjà en place.
        applicationId "app.tytoai.twa"
        minSdk 24
        targetSdk 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            // Pour l'instant on signe avec la clé de debug, le temps de
            // faire les premiers tests. On mettra la vraie clé de signature
            // (celle du 20 juillet) uniquement au moment de publier pour de
            // vrai sur le Play Store.
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source "../.."
}
